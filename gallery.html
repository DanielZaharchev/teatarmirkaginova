<style>
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 99999;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(8px);
  animation: lbFadeIn 0.25s ease;
}

@keyframes lbFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

#lightbox.active {
  display: flex;
}

.lb-inner {
  position: relative;
  max-width: 90vw;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

#lb-img {
  max-width: 88vw;
  max-height: 78vh;
  border-radius: 14px;
  box-shadow: 0 0 60px rgba(180,0,0,0.3), 0 30px 80px rgba(0,0,0,0.8);
  object-fit: contain;
  animation: lbZoomIn 0.3s cubic-bezier(0.34,1.3,0.64,1);
}

@keyframes lbZoomIn {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

#lb-caption {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: #ffb300;
}

#lb-counter {
  font-size: 13px;
  color: #666;
  letter-spacing: 1px;
}

.lb-close {
  position: fixed;
  top: 20px;
  right: 24px;
  background: rgba(255,255,255,0.07);
  border: 1px solid #333;
  color: #fff;
  font-size: 22px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lb-close:hover {
  background: #6f0000;
  border-color: #b00000;
}

.lb-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.07);
  border: 1px solid #333;
  color: white;
  font-size: 26px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}
.lb-arrow:hover {
  background: #6f0000;
  border-color: #b00000;
}
#lb-prev { left: 18px; }
#lb-next { right: 18px; }

.photo { cursor: zoom-in; }
</style>
</head>

<div id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-arrow" id="lb-prev" onclick="changeImg(-1)">&#8592;</button>
  <div class="lb-inner">
    <img id="lb-img" src="" alt="">
    <div id="lb-caption"></div>
    <div id="lb-counter"></div>
  </div>
  <button class="lb-arrow" id="lb-next" onclick="changeImg(1)">&#8594;</button>
</div>

<script src="transitions.js"></script>
<script>
const allImages = [];

document.querySelectorAll('.gallery').forEach(gallery => {
  const album = gallery.getAttribute('data-album');
  gallery.querySelectorAll('.photo').forEach((photo, i) => {
    const img = photo.querySelector('img');
    const caption = photo.querySelector('p').textContent;
    const idx = allImages.length;
    allImages.push({ src: img.src, caption, album });
    photo.addEventListener('click', () => openLB(idx));
  });
});

let current = 0;

function openLB(idx) {
  current = idx;
  showImg();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function showImg() {
  const item = allImages[current];
  const imgEl = document.getElementById('lb-img');
  imgEl.style.animation = 'none';
  imgEl.offsetHeight;
  imgEl.style.animation = '';
  imgEl.src = item.src;
  document.getElementById('lb-caption').textContent = item.album + ' — ' + item.caption;
  document.getElementById('lb-counter').textContent = (current + 1) + ' / ' + allImages.length;
}

function changeImg(dir) {
  current = (current + dir + allImages.length) % allImages.length;
  showImg();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'ArrowRight') changeImg(1);
  if (e.key === 'ArrowLeft')  changeImg(-1);
  if (e.key === 'Escape')     closeLB();
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLB();
});
</script>
